{{- if and .Values.persistence.enabled .Values.persistence.createPVC (not .Values.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "tensorboard.logsClaimName" . }}
  namespace: {{ include "tensorboard.namespace" . }}
  labels:
    {{- include "tensorboard.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.persistence.accessModes | nindent 4 }}
  storageClassName: {{ .Values.persistence.storageClassName | quote }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
{{- end }}