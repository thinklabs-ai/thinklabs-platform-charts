{{- if .Values.service.clusterIP.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tensorboard.fullname" . }}
  namespace: {{ include "tensorboard.namespace" . }}
  labels:
    {{- include "tensorboard.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "tensorboard.selectorLabels" . | nindent 4 }}
  ports:
    - name: http-cluster
      port: {{ .Values.service.clusterIP.port }}
      targetPort: 6006
      protocol: TCP
{{- end }}