apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tensorboard.fullname" . }}
  namespace: {{ include "tensorboard.namespace" . }}
  labels:
    {{- include "tensorboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tensorboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tensorboard.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "tensorboard.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: tensorboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
          args:
            - >
              tensorboard
              --logdir={{ .Values.tensorboard.logdir }}
              --host=0.0.0.0
              --port=6006
              {{- range .Values.tensorboard.extraArgs }} {{ . }}{{- end }}
          ports:
            - name: http
              containerPort: 6006
              protocol: TCP
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: tensorboard-logs
              mountPath: {{ .Values.persistence.mountPath }}
              readOnly: {{ .Values.persistence.readOnly }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            tcpSocket:
              port: 6006
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 6006
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: tensorboard-logs
          persistentVolumeClaim:
            claimName: {{ include "tensorboard.logsClaimName" . }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}