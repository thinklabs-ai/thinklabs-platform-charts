apiVersion: batch/v1
kind: Job
metadata:
  name: tensorboard-writer-sample
  namespace: mlops
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: writer
          image: python:3.11-slim
          command:
            - /bin/sh
            - -c
          args:
            - |
              pip install --no-cache-dir torch tensorboard && \
              cat >/logs/writer.py <<'PY'
              import os
              import time
              from torch.utils.tensorboard import SummaryWriter

              LOG_DIR = os.environ.get("TB_LOG_DIR", "/logs/sample-run")
              writer = SummaryWriter(log_dir=LOG_DIR)

              for step in range(1, 21):
                  loss = 1.0 / step
                  accuracy = step / 20.0
                  writer.add_scalar("train/loss", loss, step)
                  writer.add_scalar("train/accuracy", accuracy, step)
                  print(f"step={step} loss={loss:.4f} accuracy={accuracy:.4f}")
                  writer.flush()
                  time.sleep(2)

              writer.close()
              print("Done writing TensorBoard logs.")
              PY
              python /logs/writer.py
          env:
            - name: TB_LOG_DIR
              value: /logs/sample-run
          volumeMounts:
            - name: tensorboard-logs
              mountPath: /logs
      volumes:
        - name: tensorboard-logs
          persistentVolumeClaim:
            claimName: tensorboard-tensorboard-logs