{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kafka.secretName" . }}
  labels:
    {{- include "kafka.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.secretKeys.clusterIdKey }}: {{ .Values.kraft.clusterId | quote }}
  {{- end }}