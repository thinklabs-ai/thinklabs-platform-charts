apiVersion: v1
kind: Service
metadata:
  name: orchestrator-api
  namespace: {{ .Values.namespace }}
  labels:
    app: orchestrator-api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: orchestrator-api
