apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator-api
  namespace: {{ .Values.namespace }}
  labels:
    app: orchestrator-api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: orchestrator-api
  template:
    metadata:
      labels:
        app: orchestrator-api
      {{- if .Values.podAnnotations }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.image.pullSecrets | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "thinklabs-orchestrator.fullname" . }}-sa
      containers:
        - name: orchestrator-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
          env:
            - name: ENV
              value: {{ .Values.environment | quote }}
            - name: TENANT
              value: {{ .Values.tenant | quote }}
            - name: KAFKA_BROKERS
              value: {{ .Values.env.KAFKA_BROKERS | quote }}
            - name: TOPIC_REQUESTS
              value: {{ .Values.env.TOPIC_REQUESTS | quote }}
            - name: TOPIC_STATUS
              value: {{ .Values.env.TOPIC_STATUS | quote }}
            - name: TOPIC_RESPONSE
              value: {{ .Values.env.TOPIC_RESPONSE | quote }}
            {{- if .Values.env.KAFKA_SECURITY_PROTOCOL }}
            - name: KAFKA_SECURITY_PROTOCOL
              value: {{ .Values.env.KAFKA_SECURITY_PROTOCOL | quote }}
            {{- end }}
            {{- if .Values.env.KAFKA_SASL_MECHANISM }}
            - name: KAFKA_SASL_MECHANISM
            {{- if .Values.env.REDIS_PASSWORD }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: password
            {{- end }}
            {{- if .Values.env.REDIS_TLS_ENABLED }}
            - name: REDIS_TLS_ENABLED
              value: {{ .Values.env.REDIS_TLS_ENABLED | quote }}
            {{- end }}
              value: {{ .Values.env.KAFKA_SASL_MECHANISM | quote }}
            {{- end }}
            {{- if .Values.env.KAFKA_SASL_USERNAME }}
            - name: KAFKA_SASL_USERNAME
              value: {{ .Values.env.KAFKA_SASL_USERNAME | quote }}
            {{- end }}
            - name: STATUS_STORE
              value: {{ .Values.env.STATUS_STORE | quote }}
            - name: REDIS_ADDR
              value: {{ .Values.env.REDIS_ADDR | quote }}
            - name: REDIS_DB
              value: {{ .Values.env.REDIS_DB | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.env.OTEL_EXPORTER_OTLP_ENDPOINT | quote }}
            - name: OTEL_ENV
              value: {{ .Values.env.OTEL_ENV | quote }}
            - name: SLACK_WEBHOOK_URL
              value: {{ .Values.env.SLACK_WEBHOOK_URL | quote }}
            - name: SLACK_NOTIFY_STATUSES
              value: {{ .Values.env.SLACK_NOTIFY_STATUSES | quote }}
            {{- if .Values.env.KAFKA_SASL_PASSWORD }}
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kafka-credentials
                  key: sasl-password
            {{- end }}
            {{- if .Values.env.REDIS_PASSWORD }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: password
            {{- end }}
