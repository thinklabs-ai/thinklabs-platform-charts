# Example Kubernetes Secrets for Deployment
# IMPORTANT: Do NOT commit this file with real credentials!
# This is a template showing the structure needed.

# Notes:
# - Kafka: Deployed in AKS (no external secrets needed)
# - Redis: Use in-cluster Redis or Azure managed service (optional)
# - ACR: Only needed if using private container registry

---
# Redis Cache Access Key Secret (Optional - only for managed Azure Redis)
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: orchestrator
type: Opaque
stringData:
  # Only needed for Azure Cache for Redis
  # Get from: Azure Portal > Azure Cache for Redis > Access Keys > Primary Access Key
  password: "YOUR_REDIS_PRIMARY_ACCESS_KEY"

---
# Slack Webhook URL Secret (Optional)
apiVersion: v1
kind: Secret
metadata:
  name: slack-webhook
  namespace: orchestrator
type: Opaque
stringData:
  # Get from: Slack App Configuration > Webhook URLs
  webhook-url: ""

---
# Azure Container Registry Pull Secret
apiVersion: v1
kind: Secret
metadata:
  name: acr-secret
  namespace: orchestrator
type: kubernetes.io/dockercfg
data:
  # Create this secret using:
  # kubectl create secret docker-registry acr-secret \
  #   --docker-server=thinklabsinternalacrdev.azurecr.io \
  #   --docker-username=<USERNAME> \
  #   --docker-password=<PASSWORD> \
  #   --docker-email=<EMAIL> \
  #   -n orchestrator
  #
  # Or base64 encode the .dockercfg manually
  .dockercfg: eyJhY3IucmVnaXN0cnkudXJsIjogeyJhdXRoIjogImJhc2U2NC1lbmNvZGVkLWNyZWRlbnRpYWxzIn19
