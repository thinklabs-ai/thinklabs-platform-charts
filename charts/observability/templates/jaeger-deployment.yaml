{{- if .Values.jaeger.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/component: jaeger
spec:
  replicas: {{ .Values.jaeger.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: jaeger
      app.kubernetes.io/component: jaeger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jaeger
        app.kubernetes.io/component: jaeger
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.imagePullSecrets | indent 8 }}
      {{- end }}
      containers:
        - name: jaeger
          image: "{{ .Values.jaeger.image.repository }}:{{ .Values.jaeger.image.tag }}"
          imagePullPolicy: {{ .Values.jaeger.image.pullPolicy }}
          env:
            - name: SPAN_STORAGE_TYPE
              value: {{ .Values.jaeger.env.SPAN_STORAGE_TYPE | quote }}
            - name: BADGER_EPHEMERAL
              value: {{ .Values.jaeger.env.BADGER_EPHEMERAL | quote }}
            - name: COLLECTOR_OTLP_ENABLED
              value: {{ .Values.jaeger.env.COLLECTOR_OTLP_ENABLED | quote }}
          ports:
            - name: ui
              containerPort: {{ .Values.jaeger.service.uiPort }}
            - name: grpc
              containerPort: {{ .Values.jaeger.service.grpcPort }}
            - name: otlp-grpc
              containerPort: {{ .Values.jaeger.service.otlpGrpcPort }}
          resources:
{{ toYaml .Values.jaeger.resources | indent 12 }}
      {{- with .Values.jaeger.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.jaeger.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.jaeger.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
      {{- end }}
{{- end }}