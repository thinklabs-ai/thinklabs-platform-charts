apiVersion: v1
kind: Pod
metadata:
  name: slack-webhook-test
  namespace: orchestrator
  labels:
    app: slack-webhook-test
    purpose: verification
spec:
  serviceAccountName: slack-webhook-test-sa
  containers:
    - name: slack-test
      image: curlimages/curl:latest
      imagePullPolicy: IfNotPresent
      command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "=========================================="
          echo "Slack Webhook Connectivity Verification"
          echo "=========================================="
          echo ""
          
          # Configuration
          SLACK_WEBHOOK_URL="${SLACK_WEBHOOK_URL}"
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
              echo "Error: SLACK_WEBHOOK_URL environment variable not set"
              exit 1
          fi
          SLACK_HOST=$(echo "$SLACK_WEBHOOK_URL" | sed -E 's|^https?://([^/]+).*|\1|')
          
          echo "Configuration:"
          echo "  Webhook Host: $SLACK_HOST"
          echo "  Webhook URL: $SLACK_WEBHOOK_URL"
          echo ""
          
          # Test 1: DNS Resolution
          echo "Test 1: DNS Resolution"
          if nslookup "$SLACK_HOST" > /dev/null 2>&1; then
              echo "✓ DNS resolution successful"
              nslookup "$SLACK_HOST" 2>&1 | grep -A 1 "Address" || true
          else
              echo "✗ DNS resolution failed"
              exit 1
          fi
          echo ""
          
          # Test 2: Network Connectivity to HTTPS Port
          echo "Test 2: Network Connectivity (TLS/HTTPS)"
          if timeout 10 sh -c "cat < /dev/null > /dev/tcp/$SLACK_HOST/443" 2>/dev/null; then
              echo "✓ Port 443 (HTTPS) is accessible"
          else
              echo "✗ Cannot reach port 443 - check network policies"
              exit 1
          fi
          echo ""
          
          # Test 3: HTTPS Request to Slack
          echo "Test 3: HTTPS Request to Slack Webhook"
          echo "  Sending test notification..."
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              -H 'Content-type: application/json' \
              --data '{"text":"Test notification from Kubernetes cluster"}' \
              "$SLACK_WEBHOOK_URL" 2>&1)
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ Webhook request successful (HTTP $HTTP_CODE)"
              echo "  Response: $BODY"
          else
              echo "✗ Webhook request failed (HTTP $HTTP_CODE)"
              echo "  Response: $BODY"
              exit 1
          fi
          echo ""
          
          echo "=========================================="
          echo "✅ All Slack webhook tests passed!"
          echo "=========================================="
      env:
        - name: SLACK_WEBHOOK_URL
          valueFrom:
            configMapKeyRef:
              name: slack-webhook-config
              key: webhook_url
              optional: true
  restartPolicy: Never
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: slack-webhook-config
  namespace: orchestrator
data:
  webhook_url: ""  # Set this to your actual webhook URL
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: slack-webhook-test-sa
  namespace: orchestrator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: slack-webhook-test-role
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: slack-webhook-test-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: slack-webhook-test-role
subjects:
  - kind: ServiceAccount
    name: slack-webhook-test-sa
    namespace: orchestrator
